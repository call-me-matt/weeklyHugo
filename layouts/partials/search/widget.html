<section class="widget" id="search-widget-wrapper">
  <h3 class="widget-title">{{ i18n "search_title" | default "Search" }}</h3>

  <link href="/pagefind/pagefind-ui.css" rel="stylesheet">
  <script src="/pagefind/pagefind-ui.js"></script>

  <div id="search"></div>

  <script>
    window.addEventListener('load', function() {
      if (typeof PagefindUI !== "undefined") {
        new PagefindUI({
          element: "#search",
          showSubResults: false,
          pageSize: 5,
          translations: { placeholder: "Search..." }
        });

        var modeSwitch = document.getElementById('mode');
        var wrapper = document.getElementById('search-widget-wrapper');

        var updateSearchMode = function() {
          // REVERSE LOGIC: 
          // If switch is ON (checked) -> Dark Mode
          // If switch is OFF -> Light Mode
          if (modeSwitch && modeSwitch.checked) {
            wrapper.setAttribute('data-ui-mode', 'dark');
          } else {
            wrapper.setAttribute('data-ui-mode', 'light');
          }
        };

        if (modeSwitch) {
          updateSearchMode();
          modeSwitch.addEventListener('change', updateSearchMode);
        }
      }
    });
  </script>

  <style>
    /* --- BASE SETUP --- */
    #search { 
      margin-bottom: 2rem; 
      width: 100%; 
      background: transparent !important; 
    }

    .pagefind-ui__result, 
    .pagefind-ui__drawer, 
    .pagefind-ui__form,
    .pagefind-ui__results-area { 
      background-color: transparent !important; 
    }

    /* Clear button (X) */
    #search .pagefind-ui__search-clear {
      background-color: transparent !important;
      border: none !important;
      opacity: 0.7 !important;
    }

    /* --- LIGHT MODE SET (Dark Text) --- */
    [data-ui-mode="light"] #search {
      --pagefind-ui-text: #000000 !important;
    }
    [data-ui-mode="light"] #search * {
      color: #000000 !important;
      -webkit-text-fill-color: #000000 !important;
    }
    [data-ui-mode="light"] .pagefind-ui__search-input {
      background-color: rgba(0, 0, 0, 0.05) !important;
      color: #000000 !important;
    }

    /* --- DARK MODE SET (Light Text) --- */
    [data-ui-mode="dark"] #search {
      --pagefind-ui-text: #ffffff !important;
    }
    [data-ui-mode="dark"] #search * {
      color: #ffffff !important;
      -webkit-text-fill-color: #ffffff !important;
      opacity: 1 !important;
    }
    [data-ui-mode="dark"] .pagefind-ui__search-input {
      background-color: rgba(255, 255, 255, 0.1) !important;
      color: #ffffff !important;
      border: 1px solid #444 !important;
    }
    [data-ui-mode="dark"] .pagefind-ui__result-link {
      color: #80bfff !important;
    }
    [data-ui-mode="dark"] #search .pagefind-ui__search-clear {
      filter: invert(1) !important;
    }

    /* Pagefind Drawer Fix */
    .pagefind-ui__drawer { position: relative !important; display: block !important; }
  </style>
</section>
