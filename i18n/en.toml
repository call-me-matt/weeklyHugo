[sidebar_osm]
other = "OpenStreetMap is a huge database, allows everybody to create maps according to their needs. OSM is made by people like you and free to use under an open license."

[what_is_the_idea]
other = "What is the idea?"

[what_is_the_idea_paragraph_1]
other = "weeklyOSM updates the community about what is going on in the OSM Universe. weeklyOSM is intended for everyone, from experienced mappers to new OSM members. It is created by mappers and OSM enthusiasts. Contributors to weeklyOSM in all languages are always welcome."

[what_is_the_idea_paragraph_2]
other = "The idea of weeklyOSM is to collect relevant OSM news from all over the world, process it and translate it into as many languages as possible. This should help to inform the community as comprehensively as possible and overcome language barriers."

[what_is_the_idea_paragraph_3]
other = "weeklyOSM is independent of all organisations and companies. This applies to OSMF, HOT, FOSSGIS … and all other companies not listed here. We would also like to point out that the editorial staff are not subject to OSMF supervision."

[who_and_where_are_we]
