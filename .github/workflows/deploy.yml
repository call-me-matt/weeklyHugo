name: Build, Test, and Deploy via SFTP

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build Hugo
        run: hugo --gc --minify

      - name: Build Pagefind
        run: npx pagefind --site public

      - name: Run Integrity Checks
        run: |
          # Install yq to read your languages.toml
          sudo wget -nv https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq && sudo chmod +x /usr/bin/yq

          # Get all language keys (e.g., pt-br, en, es)
          LANG_KEYS=$(yq 'keys | join(" ")' config/_default/languages.toml)

          echo "Starting verification for: ${LANG_KEYS}"

          # Global Pagefind check
          if [ ! -s "public/pagefind/pagefind.js" ]; then
            echo "::error::Search index pagefind.js is missing or empty!"
            exit 1
          fi

          for key in $LANG_KEYS; do
            # 1. Get the contentDir for this specific key (e.g., "content/br")
            # 2. Use 'sed' to remove the "content/" prefix to get the output folder name (e.g., "br")
            RAW_DIR=$(yq ".\"$key\".contentDir" config/_default/languages.toml)
            OUT_DIR=$(echo $RAW_DIR | sed 's|^content/||')

            echo "Checking Language Key: $key (Output Folder: public/$OUT_DIR)"

            # Verify the physical output folder exists
            if [ ! -d "public/$OUT_DIR" ]; then
              echo "::error::Output folder 'public/$OUT_DIR' missing for language '$key'"
              exit 1
            fi

            # Verify the Pagefind index exists using the Language Key (ISO code)
            # Pagefind uses the [key], e.g., pagefind.pt-br_HASH.pf_meta
            if ! ls public/pagefind/pagefind.${key}_*.pf_meta >/dev/null 2>&1; then
              echo "::error::Pagefind index meta missing for language key: $key"
              exit 1
            fi

            echo "✓ Integrity passed for $key ($OUT_DIR)"
          done

          echo "All checks passed!"

#      - name: Deploy to Server via SFTP
#        ... (rest of your deployment)
