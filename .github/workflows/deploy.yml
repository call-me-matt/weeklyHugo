name: Build, Test, and Deploy via SFTP

on: [push, pull_request]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: "recursive"
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build Hugo
        run: hugo --gc --minify

      - name: Build Pagefind
        run: npx pagefind --site public

      - name: Run Integrity Checks
        run: |
          # Install yq to read your languages.toml
          sudo wget -nv https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq && sudo chmod +x /usr/bin/yq

          # Extract all language identifiers (e.g., de, en, br, zh, jp)
          LANGS=$(yq 'keys | join(" ")' config/_default/languages.toml)

          echo "Verifying deployment integrity for: ${LANGS}"

          # Global Check: Ensure the search index exists
          if [ ! -s "public/pagefind/pagefind.js" ]; then
            echo "::error::Global Pagefind index (pagefind.js) is missing or empty!"
            exit 1
          fi

          for lang in $LANGS; do
            echo "Checking language: $lang"

            # 1. Directory Check
            # Identifier == Folder Name, check public/$lang
            if [ ! -d "public/$lang" ]; then
              echo "::error::Output directory 'public/$lang' was not generated!"
              exit 1
            fi

            # 2. Pagefind Metadata Check
            # Pagefind names its metadata files based on the Hugo language identifier
            if ! ls public/pagefind/pagefind.${lang}_*.pf_meta >/dev/null 2>&1; then
              echo "::error::Pagefind search metadata missing for language: $lang"
              exit 1
            fi

            echo "✓ Integrity passed for $key ($OUT_DIR)"
          done

          echo "All checks passed!"

